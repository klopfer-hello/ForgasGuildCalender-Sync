name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[gui]"
          pip install pyinstaller

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed ^
            --name "FGC-Sync" ^
            --icon "resources/app.ico" ^
            --add-data "resources;resources" ^
            --add-data "pyproject.toml;." ^
            --hidden-import "PIL" ^
            --hidden-import "fgc_sync.services.discord_poster" ^
            --hidden-import "fgc_sync.services.roster_image" ^
            --hidden-import "fgc_sync.services.google_calendar" ^
            --hidden-import "fgc_sync.services.lua_parser" ^
            --hidden-import "fgc_sync.services.file_watcher" ^
            --hidden-import "fgc_sync.services.updater" ^
            --hidden-import "fgc_sync.services.config" ^
            --hidden-import "fgc_sync.controllers.app_controller" ^
            --hidden-import "fgc_sync.controllers.sync_controller" ^
            src/fgc_sync/app.py
        shell: cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-executables
          path: dist/FGC-Sync.exe

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-executables
          path: dist

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          # Find the previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          {
            echo "CHANGELOG<<CHANGELOG_EOF"

            # Features
            FEATS=$(git log "$RANGE" --pretty=format:"%s" | grep -E "^feat" | sed 's/^feat[^:]*: //' || true)
            if [ -n "$FEATS" ]; then
              echo "### New Features"
              echo "$FEATS" | while read -r line; do echo "- $line"; done
              echo ""
            fi

            # Fixes
            FIXES=$(git log "$RANGE" --pretty=format:"%s" | grep -E "^fix" | sed 's/^fix[^:]*: //' || true)
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES" | while read -r line; do echo "- $line"; done
              echo ""
            fi

            # Refactors
            REFACTORS=$(git log "$RANGE" --pretty=format:"%s" | grep -E "^refactor" | sed 's/^refactor[^:]*: //' || true)
            if [ -n "$REFACTORS" ]; then
              echo "### Improvements"
              echo "$REFACTORS" | while read -r line; do echo "- $line"; done
              echo ""
            fi

            # Docs
            DOCS=$(git log "$RANGE" --pretty=format:"%s" | grep -E "^docs" | sed 's/^docs[^:]*: //' || true)
            if [ -n "$DOCS" ]; then
              echo "### Documentation"
              echo "$DOCS" | while read -r line; do echo "- $line"; done
              echo ""
            fi

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          files: dist/FGC-Sync.exe
